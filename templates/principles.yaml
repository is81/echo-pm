# Project Immutable Principles
# Usage: Append new principles below, never overwrite existing entries
# Change process: (1) Submit PR → (2) Full team review → (3) Explicitly document the reason for change

principles:
  - id: "principle-1"
    name: "Principle Name"
    statement: "One-sentence statement"
    rationale: "Why this is immutable — explain the reasoning behind it. This is more important than the principle itself."
    immutable: true
    added: "YYYY-MM-DD"

  # To add a new principle, append below:
  # - id: "principle-2"
  #   name: "..."
  #   statement: "..."
  #   rationale: "..."
  #   immutable: true
  #   added: "YYYY-MM-DD"
